  "kbLayout": "woorden"
}/*EDITMODE-END*/;

// ---- live suggestion (the §2.1 introspection affordance) ----------------
function computeSuggestion(code, turtleNames, typeOf) {
  const Lang = window.Schildpad, FBlib = window.SchildpadFB;
  typeOf = typeOf || (() => null);
  const lines = code.split("\n");
  let last = "";
  for (let i = lines.length - 1; i >= 0; i--) { if (lines[i].trim()) { last = lines[i].trim(); break; } }
  if (!last) return null;
  const toks = Lang.tokenize(last);
  const verbTok = toks.find((t) => t.kind === "verb");
  if (verbTok) {
    const sig = Lang.VERBS[verbTok.value.toLowerCase()];
    const filled = new Set();
    for (const t of toks) {
      if (t === verbTok) continue;
      if (t.kind === "dir") filled.add("draairichting");
      else if (t.kind === "colour") filled.add("kleur");
      else if (t.kind === "number") filled.add("getal");
      else if (t.kind === "name") {
        const ty = typeOf(t.value.toLowerCase());
        if (ty && ty !== "nil") filled.add(ty);
        else if (turtleNames.includes(t.value.toLowerCase())) filled.add("schildpad");
      }
    }
    const missing = sig.slots.filter((s) => !filled.has(s));
    if (!missing.length) return { title: `${verbTok.value} is compleet — druk enter`, chips: [] };
    const chips = [];
    for (const m of missing) {
      if (m === "schildpad") turtleNames.forEach((n) => chips.push({ label: n, insert: n + " ", color: "#dbe2e8" }));
      if (m === "getal") chips.push({ label: "een getal", insert: "", color: "#ffd23a" });
      if (m === "draairichting") { chips.push({ label: "links", insert: "links ", color: "#9ad6a8" }); chips.push({ label: "rechts", insert: "rechts ", color: "#9ad6a8" }); }
      if (m === "kleur") Lang.COLORS.forEach((c) => chips.push({ label: c, insert: c + " ", color: FBlib.NAMED[c] }));
    }
    return { title: `${verbTok.value} wil nog: ${missing.join(" + ")}`, chips };
  }
  const nameTok = toks.find((t) => t.kind === "name" && turtleNames.includes(t.value.toLowerCase()));
  if (nameTok && toks.length === 1) {
    return { title: `${nameTok.value} kan:`, chips: [
      { label: "vooruit", insert: "vooruit ", color: "#8ec9ff" }, { label: "draai", insert: "draai ", color: "#8ec9ff" },
      { label: "pen", insert: "pen ", color: "#8ec9ff" }, { label: "penomhoog", insert: "penomhoog ", color: "#8ec9ff" },
    ] };
  }
  if (toks[0] && toks[0].kind === "maak") {
    return { title: "maak een…", chips: [
      { label: "schildpad", insert: "schildpad ", color: "#b79bff" }, { label: "getal", insert: "getal ", color: "#b79bff" }, { label: "draairichting", insert: "draairichting ", color: "#b79bff" },
    ] };
  }
  return null;
}

function App() {
  const { Editor } = window.SchildpadEditor;
  const { Transport, MessageBar, StatusBar } = window.SchildpadChrome;
  const { OnScreenKeyboard } = window.SchildpadKeyboard;
  const Lang = window.Schildpad, FBlib = window.SchildpadFB;
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const [code, setCode] = useState(STARTER);
  const [tstate, setTstate] = useState("idle");      // idle|playing|paused|looping|stepping|error|done
  const [currentLine, setCurrentLine] = useState(null);
  const [errorLine, setErrorLine] = useState(null);
  const [message, setMessage] = useState({ mode: "help" });
  const [pointer, setPointer] = useState({ x: 0, y: 0, down: false, inside: false });
  const [recentKeys, setRecentKeys] = useState("");
  const [audioActive, setAudioActive] = useState(false);
  const [fbDisp, setFbDisp] = useState({ w: 640, h: 672 });
  const [scaleFit, setScaleFit] = useState(1);
  const [speed, setSpeed] = useState("snel");
  const [menuOpen, setMenuOpen] = useState(false);

  const drawRef = useRef(null), spriteRef = useRef(null), fbStageRef = useRef(null);
  const fbRef = useRef(null), engineRef = useRef(null), programRef = useRef(null);
  const timerRef = useRef(null), taRef = useRef(null);
  const fbWRef = useRef(320), fbHRef = useRef(336), firstSizeRef = useRef(true);
  const speedRef = useRef(80); speedRef.current = speed === "snel" ? 80 : 250;
  const audioCtxRef = useRef(null), analyserRef = useRef(null);
  const styleRef = useRef(t.turtleStyle);
  styleRef.current = t.turtleStyle;
  const codeRef = useRef(code); codeRef.current = code;

  const lines = useMemo(() => code.split("\n"), [code]);
  const analysis = useMemo(() => Lang.analyze(code), [code]);

  // ---- init engine + sprite RAF (framebuffer is built by the size effect) --
  useEffect(() => {
    const ctx = {
      clear: () => fbRef.current && fbRef.current.clear(),
      print: (s) => fbRef.current && fbRef.current.print(s),
      move: (turtle, d) => fbRef.current && fbRef.current.move(turtle, d),
      onSummon: (turtle) => { turtle._bornAt = performance.now(); },
      onTurn: () => {},
      defaultPen: (i) => fbRef.current.defaultPen(i),
      colorOf: (n) => fbRef.current.colorOf(n),
      audio: (spec) => playAudio(spec),
    };
    engineRef.current = new Lang.Engine(ctx);
    let raf;
    const loop = () => {
      if (fbRef.current) fbRef.current.renderSprites(engineRef.current.turtleOrder, styleRef.current, performance.now());
      raf = requestAnimationFrame(loop);
    };
    loop();
    // auto-run the starter once so the canvas is alive on arrival
    const boot = setTimeout(() => doPlay(false), 650);
    return () => { cancelAnimationFrame(raf); clearTimeout(boot); };
    // eslint-disable-next-line
  }, []);

  useEffect(() => { if (fbRef.current) fbRef.current.setFont(t.canvasFont); }, [t.canvasFont]);

  // ---- scale frame to viewport -----------------------------------------
  useLayoutEffect(() => {
    const fit = () => setScaleFit(Math.min(window.innerWidth / FRAME_W, window.innerHeight / FRAME_H));
    fit(); window.addEventListener("resize", fit);
    return () => window.removeEventListener("resize", fit);
  }, []);

  // ---- size framebuffer to fill its container -------------------------------
  // Measure LAYOUT size (clientWidth/Height) — unaffected by the frame's CSS
  // transform — so the canvas fills the pane at any window size. Width fills
  // exactly (320 logical px scaled up); rows fill the available height. Square
  // pixels (same scale both axes), kept crisp with image-rendering: pixelated.
  useLayoutEffect(() => {
    const el = fbStageRef.current; if (!el) return;
    const avW = el.clientWidth - 6, avH = el.clientHeight - 6;
    if (avW <= 0 || avH <= 0) return;
    const scale = Math.max(1, avW / (COLS * 8));
    const rows = Math.max(8, Math.floor(avH / (scale * 8)));
    fbRef.current = FBlib.create({ drawCanvas: drawRef.current, spriteCanvas: spriteRef.current, cols: COLS, rows });
    fbRef.current.setFont(t.canvasFont);
    fbWRef.current = COLS * 8; fbHRef.current = rows * 8;
    setFbDisp({ w: Math.round(COLS * 8 * scale), h: Math.round(rows * 8 * scale) });
    if (firstSizeRef.current) { firstSizeRef.current = false; }
    else { runAllCurrent(); }     // keyboard toggle resized the canvas — repaint instantly
    // eslint-disable-next-line
  }, [t.showKeyboard]);

  // ---- audio -----------------------------------------------------------
  const playAudio = useCallback((spec) => {
    try {
      if (!audioCtxRef.current) {
        const AC = window.AudioContext || window.webkitAudioContext;
        const ac = new AC();
        const an = ac.createAnalyser(); an.fftSize = 256; an.connect(ac.destination);
        audioCtxRef.current = ac; analyserRef.current = an;
      }
      const ac = audioCtxRef.current, an = analyserRef.current;
      if (ac.state === "suspended") ac.resume();
      const now = ac.currentTime;
      const notes = spec.kind === "freq" ? [spec.freq] : spec.notes;
      const dur = 0.26;
      notes.forEach((f, i) => {
        const osc = ac.createOscillator(), g = ac.createGain();
        osc.type = "square"; osc.frequency.value = f;
        const tt = now + i * dur;
        g.gain.setValueAtTime(0.0001, tt);
        g.gain.exponentialRampToValueAtTime(0.18, tt + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, tt + dur - 0.02);
        osc.connect(g).connect(an);
        osc.start(tt); osc.stop(tt + dur);
      });
      setAudioActive(true);
      const total = notes.length * dur * 1000 + 250;
      clearTimeout(playAudio._t); playAudio._t = setTimeout(() => setAudioActive(false), total);
    } catch (e) { /* audio optional */ }
  }, []);

  // ---- transport -------------------------------------------------------
  const stopTimer = () => { if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; } };

  const turtleNames = () => (engineRef.current ? engineRef.current.turtleOrder.map((x) => x.name.toLowerCase()) : []);
  const typeOf = (n) => { const b = engineRef.current && engineRef.current.env.get(n); return b ? b.type : null; };
  const refreshHelp = () => setMessage({ mode: "help", suggestion: computeSuggestion(codeRef.current, turtleNames(), typeOf) });

  const handleError = (e) => {
    stopTimer();
    setTstate("error"); setErrorLine(e.line); setCurrentLine(e.line);
    setMessage({ mode: "error", errorText: e.message, errorLine: e.line });
  };

  const compileProgram = () => {
    try { return Lang.compile(codeRef.current).program; }
    catch (e) { handleError(e.schildpad ? e : { line: null, message: "ik kon dit programma niet lezen." }); return null; }
  };

  const pump = (mode) => {
    timerRef.current = setTimeout(() => {
      let r;
      try { r = engineRef.current.step(); }
      catch (e) { if (e.schildpad) handleError(e); else handleError({ line: currentLine, message: "er ging iets onverwachts mis." }); return; }
      if (r.line != null) setCurrentLine(r.line);
      if (r.done) {
        if (mode === "looping") { engineRef.current.reset(programRef.current); pump("looping"); }
        else { setTstate("done"); refreshHelp(); }
      } else { pump(mode); }
    }, Math.max(20, speedRef.current));
  };

  // run the whole current program with no animation (instant repaint, e.g. after resize)
  const runAllCurrent = () => {
    stopTimer();
    const prog = compileProgram(); if (!prog) return;
    programRef.current = prog;
    const e = engineRef.current; e.reset(prog);
    let g = 0;
    try { while (!e.done && g++ < 50000) { const r = e.step(); if (r.done) break; } }
    catch (err) { if (err.schildpad) handleError(err); return; }
    setCurrentLine(null); setTstate("done");
  };

  const doPlay = (loop) => {
    stopTimer(); setErrorLine(null);
    const prog = compileProgram(); if (!prog) return;
    programRef.current = prog;
    engineRef.current.reset(prog);
    setCurrentLine(engineRef.current.currentLine());
    setTstate(loop ? "looping" : "playing");
    setMessage({ mode: "help", suggestion: null });
    pump(loop ? "looping" : "playing");
  };

  const loadPreset = (p) => {
    setMenuOpen(false);
    setCode(p.code); codeRef.current = p.code;
    setErrorLine(null);
    setMessage({ mode: "help", suggestion: null });
    setTimeout(() => doPlay(false), 60);
  };

  const doPause = () => { stopTimer(); if (tstate !== "error") setTstate("paused"); };

  const doStep = () => {
    stopTimer(); setErrorLine(null);
    const e = engineRef.current;
    if (tstate === "idle" || tstate === "done" || tstate === "error" || e.done) {
      const prog = compileProgram(); if (!prog) return;
      programRef.current = prog; e.reset(prog);
    }
    let r;
    try { r = e.step(); }
    catch (err) { if (err.schildpad) handleError(err); return; }
    if (r.line != null) setCurrentLine(r.line);
    if (r.done) { setTstate("done"); refreshHelp(); } else { setTstate("stepping"); }
  };

  // ---- editing ---------------------------------------------------------
  const onCodeChange = (v) => {
    setCode(v); codeRef.current = v;
    if (tstate === "playing" || tstate === "looping") { stopTimer(); setTstate("paused"); }
    if (tstate === "error" || message.mode === "error") { setErrorLine(null); }
    if (tstate !== "playing" && tstate !== "looping") setCurrentLine(null);
    setMessage({ mode: "help", suggestion: computeSuggestion(v, turtleNames(), typeOf) });
  };

  const onEnterLine = (text, lineNo) => {
    try {
      engineRef.current.runLine(text, lineNo);
      setErrorLine(null);
      refreshHelp();
    } catch (e) { if (e.schildpad) { setTstate("error"); setErrorLine(e.line); setMessage({ mode: "error", errorText: e.message, errorLine: e.line }); } }
  };

  const insertAtCaret = (text) => {
    const ta = taRef.current; if (!ta) return;
    const s = ta.selectionStart, en = ta.selectionEnd;
    const v = code.slice(0, s) + text + code.slice(en);
    onCodeChange(v);
    requestAnimationFrame(() => { ta.focus(); ta.selectionStart = ta.selectionEnd = s + text.length; });
  };
  const kbBackspace = () => {
    const ta = taRef.current; if (!ta) return;
    const s = ta.selectionStart, en = ta.selectionEnd;
    if (s === en && s === 0) return;
    const from = s === en ? s - 1 : s;
    const v = code.slice(0, from) + code.slice(en);
    onCodeChange(v);
    requestAnimationFrame(() => { ta.focus(); ta.selectionStart = ta.selectionEnd = from; });
  };
  const kbEnter = () => {
    const ta = taRef.current; if (!ta) return;
    const s = ta.selectionStart;
    const lineStart = code.lastIndexOf("\n", s - 1) + 1;
    let lineEnd = code.indexOf("\n", s); if (lineEnd === -1) lineEnd = code.length;
    const lineText = code.slice(lineStart, lineEnd);
    const lineNo = code.slice(0, lineStart).split("\n").length;
    if (lineText.trim()) onEnterLine(lineText, lineNo);
    insertAtCaret("\n");
  };

  // ---- pointer over framebuffer ----------------------------------------
  const onFbMove = (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    const W = fbWRef.current, H = fbHRef.current;
    const x = Math.max(0, Math.min(W - 1, Math.floor((e.clientX - r.left) / r.width * W)));
    const y = Math.max(0, Math.min(H - 1, Math.floor((e.clientY - r.top) / r.height * H)));
    setPointer((p) => ({ ...p, x, y, inside: true }));
  };

  // ---- global key indicator + shortcuts --------------------------------
  useEffect(() => {
    const onKey = (e) => {
      let label = e.key;
      if (e.key === " ") label = "␣"; else if (e.key === "Enter") label = "⏎";
      else if (e.key === "Backspace") label = "⌫"; else if (e.key.length > 1) label = "";
      if (label) setRecentKeys((p) => (p + label).slice(-9));
      // parent shortcuts (don't steal typing keys)
      if (e.metaKey || e.ctrlKey) {
        if (e.key === "Enter") { e.preventDefault(); doPlay(false); }
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
    // eslint-disable-next-line
  }, [code, tstate]);

  // ---- layout ----------------------------------------------------------
  const kbHeight = t.showKeyboard ? (t.kbLayout === "compact" ? 250 : 318) : 0;

  return (
    <div id="stage">
      <div id="frame" style={{ width: FRAME_W, height: FRAME_H, transform: `scale(${scaleFit})`, transformOrigin: "center" }}>
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          <div style={{ display: "flex", flex: 1, minHeight: 0 }}>
            {/* CODE PANE */}
            <div style={{ width: 498, flexShrink: 0, display: "flex", flexDirection: "column", borderRight: "1px solid #1b1c1e", minHeight: 0 }}>
              <div style={{ height: 42, flexShrink: 0, display: "flex", alignItems: "center", gap: 10, padding: "0 16px", borderBottom: "1px solid #16191b", background: "#0a0a0b", position: "relative", zIndex: 30 }}>
                <span style={{ width: 11, height: 11, background: "#34e24b", borderRadius: 1, boxShadow: "0 0 8px #34e24b" }} />
                <span style={{ fontSize: 14, fontWeight: 700, letterSpacing: ".02em", color: "#dbe2e8" }}>schildpad</span>
                <span style={{ fontSize: 11, color: "#3c4147" }}>speeltuin</span>
                <span style={{ flex: 1 }} />
                <div style={{ position: "relative" }}>
                  <button onClick={() => setMenuOpen((o) => !o)} style={{
                    display: "flex", alignItems: "center", gap: 6, fontFamily: "'IBM Plex Mono', monospace", fontSize: 12,
                    color: menuOpen ? "#5cd6f0" : "#9fb0bb", background: menuOpen ? "#11171a" : "#101113",
                    border: "1px solid " + (menuOpen ? "#2b4650" : "#26282b"), borderRadius: 4, padding: "5px 10px", cursor: "pointer",
                  }}>voorbeelden <span style={{ fontSize: 9, opacity: .8 }}>{menuOpen ? "▲" : "▼"}</span></button>
                  {menuOpen && (
                    <div style={{
                      position: "absolute", top: "calc(100% + 6px)", right: 0, width: 220, maxHeight: 360, overflowY: "auto",
                      background: "#0e0f11", border: "1px solid #2a2d31", borderRadius: 6, boxShadow: "0 14px 40px rgba(0,0,0,.6)", padding: 5, zIndex: 40,
                    }}>
                      {PRESETS.map((p, i) => (
                        <button key={i} onClick={() => loadPreset(p)} style={{
                          display: "block", width: "100%", textAlign: "left", fontFamily: "'IBM Plex Mono', monospace", fontSize: 13,
                          color: "#cdd4da", background: "transparent", border: "none", borderRadius: 4, padding: "8px 10px", cursor: "pointer",
                        }}
                          onMouseEnter={(e) => (e.currentTarget.style.background = "#181b1e")}
                          onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}>{p.name}</button>
                      ))}
                    </div>
                  )}
                </div>
                <span style={{ fontSize: 10.5, color: "#3c4147" }}>{t.showKeyboard ? "schermtoetsenbord" : "hardware-toetsenbord"}</span>
              </div>
              <Editor
                code={code} analysis={analysis} lines={lines}
                currentLine={currentLine} errorLine={errorLine}
                onChange={onCodeChange} onEnterLine={onEnterLine} ghost taRef={taRef}
              />
              <MessageBar {...message} onInsert={insertAtCaret} />
              <Transport state={tstate} speed={speed} onSpeed={setSpeed} onStep={doStep} onPlay={() => doPlay(false)} onPause={doPause} onLoop={() => doPlay(true)} />
            </div>

            {/* VIEWPORT */}
            <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: 16, gap: 12, background: "#070708", minWidth: 0 }}>
              <div ref={fbStageRef} style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", minHeight: 0 }}>
                <div
                  onMouseMove={onFbMove}
                  onMouseEnter={() => setPointer((p) => ({ ...p, inside: true }))}
                  onMouseLeave={() => setPointer((p) => ({ ...p, inside: false, down: false }))}
                  onMouseDown={() => setPointer((p) => ({ ...p, down: true }))}
                  onMouseUp={() => setPointer((p) => ({ ...p, down: false }))}
                  style={{ position: "relative", width: fbDisp.w, height: fbDisp.h, boxShadow: "0 0 0 1px #16191b, 0 18px 50px rgba(0,0,0,.6)", background: "#000", cursor: "crosshair" }}>
                  <canvas ref={drawRef} style={{ position: "absolute", inset: 0, width: "100%", height: "100%", imageRendering: "pixelated" }} />
                  <canvas ref={spriteRef} style={{ position: "absolute", inset: 0, width: "100%", height: "100%", imageRendering: "pixelated", pointerEvents: "none" }} />
                </div>
              </div>
              <StatusBar pointer={pointer} analyser={analyserRef.current} audioActive={audioActive} recentKeys={recentKeys} />
            </div>
          </div>

          {/* ON-SCREEN KEYBOARD (variation) */}
          {t.showKeyboard && (
            <div style={{ flexShrink: 0, height: kbHeight }}>
              <OnScreenKeyboard layout={t.kbLayout} onKey={insertAtCaret} onBack={kbBackspace} onEnter={kbEnter} onSpace={() => insertAtCaret(" ")} />
            </div>
          )}
        </div>

        {/* TWEAKS */}
        <window.TweaksPanel>
          <window.TweakSection label="Schildpad" />
          <window.TweakRadio label="Sprite" value={t.turtleStyle} options={["schildpad", "rond", "pijl"]} onChange={(v) => setTweak("turtleStyle", v)} />
          <window.TweakSection label="Pixelfont" />
          <window.TweakRadio label="Karakter" value={t.canvasFont} options={["regular", "vet", "rond"]} onChange={(v) => setTweak("canvasFont", v)} />
          <window.TweakSection label="Toetsenbord" />
          <window.TweakToggle label="Schermtoetsenbord" value={t.showKeyboard} onChange={(v) => setTweak("showKeyboard", v)} />
          <window.TweakSelect label="Indeling" value={t.kbLayout} options={["woorden", "gegroepeerd", "compact"]} onChange={(v) => setTweak("kbLayout", v)} disabled={!t.showKeyboard} />
        </window.TweaksPanel>
      </div>
    </div>
  );
}

function mountSchildpad(tries) {
  tries = tries || 0;
  const mods = {
    SchildpadEditor: window.SchildpadEditor, SchildpadChrome: window.SchildpadChrome,
    SchildpadKeyboard: window.SchildpadKeyboard, useTweaks: window.useTweaks,
    TweaksPanel: window.TweaksPanel, Schildpad: window.Schildpad,
    SchildpadFB: window.SchildpadFB, SchildpadFont: window.SchildpadFont,
  };
  const missing = Object.keys(mods).filter((k) => !mods[k]);
  if (missing.length) {
    if (tries > 60) {
      document.getElementById("root").innerHTML =
        '<pre style="color:#e0746c;font:14px monospace;padding:24px;white-space:pre-wrap">ontbrekende modules: ' + missing.join(", ") + "</pre>";
      return;
    }
    setTimeout(() => mountSchildpad(tries + 1), 30);
    return;
  }
  try {
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  } catch (e) {
    document.getElementById("root").innerHTML =
      '<pre style="color:#e0746c;font:14px monospace;padding:24px;white-space:pre-wrap">render-fout: ' + (e && e.message) + "\n\n" + (e && e.stack) + "</pre>";
  }
}
mountSchildpad();




</script>
</body>
</html>
